<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 320" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <style>
    .phase-box { filter: url(#shadow); }
    .phase-label { font-size: 13px; font-weight: 700; fill: #fff; }
    .phase-detail { font-size: 10px; fill: #fff; opacity: 0.9; }
    .connector { stroke: #475569; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .reject-line { stroke: #dc2626; stroke-width: 2; fill: none; stroke-dasharray: 6,3; marker-end: url(#arrow-red); }
    .reject-label { font-size: 10px; fill: #dc2626; font-weight: 600; }
    .title { font-size: 16px; font-weight: 700; fill: #1e293b; }
    .subtitle { font-size: 11px; fill: #64748b; }
    .escalate-label { font-size: 10px; fill: #f59e0b; font-weight: 600; }
  </style>

  <text x="460" y="28" text-anchor="middle" class="title">Ralph Loop Phase Pipeline</text>
  <text x="460" y="46" text-anchor="middle" class="subtitle">Each phase runs a full OODA cycle (Observe ’ Plan ’ Act ’ Validate ’ Reflect)</text>

  <!-- GitHub Issue input -->
  <rect x="10" y="100" width="100" height="60" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" class="phase-box"/>
  <text x="60" y="126" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">GitHub</text>
  <text x="60" y="141" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">Issue</text>

  <!-- Arrow to Triage -->
  <line x1="110" y1="130" x2="140" y2="130" class="connector"/>

  <!-- Triage -->
  <rect x="142" y="80" width="120" height="100" rx="10" fill="#3b82f6" class="phase-box"/>
  <text x="202" y="110" text-anchor="middle" class="phase-label">TRIAGE</text>
  <text x="202" y="126" text-anchor="middle" class="phase-detail">Classify severity</text>
  <text x="202" y="139" text-anchor="middle" class="phase-detail">Find affected files</text>
  <text x="202" y="152" text-anchor="middle" class="phase-detail">Attempt repro</text>
  <text x="202" y="165" text-anchor="middle" class="phase-detail">Detect repo stack</text>

  <!-- Arrow to Implement -->
  <line x1="262" y1="130" x2="292" y2="130" class="connector"/>

  <!-- Implement -->
  <rect x="294" y="80" width="120" height="100" rx="10" fill="#8b5cf6" class="phase-box"/>
  <text x="354" y="110" text-anchor="middle" class="phase-label">IMPLEMENT</text>
  <text x="354" y="126" text-anchor="middle" class="phase-detail">Identify root cause</text>
  <text x="354" y="139" text-anchor="middle" class="phase-detail">Write minimal fix</text>
  <text x="354" y="152" text-anchor="middle" class="phase-detail">Run linters</text>
  <text x="354" y="165" text-anchor="middle" class="phase-detail">Inner iteration loop</text>

  <!-- Arrow to Review -->
  <line x1="414" y1="130" x2="444" y2="130" class="connector"/>

  <!-- Review -->
  <rect x="446" y="80" width="120" height="100" rx="10" fill="#06b6d4" class="phase-box"/>
  <text x="506" y="110" text-anchor="middle" class="phase-label">REVIEW</text>
  <text x="506" y="126" text-anchor="middle" class="phase-detail">Zero-trust review</text>
  <text x="506" y="139" text-anchor="middle" class="phase-detail">Correctness check</text>
  <text x="506" y="152" text-anchor="middle" class="phase-detail">Security scan</text>
  <text x="506" y="165" text-anchor="middle" class="phase-detail">Path consistency</text>

  <!-- Arrow to Validate -->
  <line x1="566" y1="130" x2="596" y2="130" class="connector"/>

  <!-- Validate -->
  <rect x="598" y="80" width="120" height="100" rx="10" fill="#10b981" class="phase-box"/>
  <text x="658" y="110" text-anchor="middle" class="phase-label">VALIDATE</text>
  <text x="658" y="126" text-anchor="middle" class="phase-detail">Verify minimal diff</text>
  <text x="658" y="139" text-anchor="middle" class="phase-detail">Generate PR desc</text>
  <text x="658" y="152" text-anchor="middle" class="phase-detail">Create PR</text>
  <text x="658" y="165" text-anchor="middle" class="phase-detail">Monitor CI status</text>

  <!-- Arrow to Report -->
  <line x1="718" y1="130" x2="748" y2="130" class="connector"/>

  <!-- Report -->
  <rect x="750" y="80" width="120" height="100" rx="10" fill="#f59e0b" class="phase-box"/>
  <text x="810" y="110" text-anchor="middle" class="phase-label">REPORT</text>
  <text x="810" y="126" text-anchor="middle" class="phase-detail">Decision tree</text>
  <text x="810" y="139" text-anchor="middle" class="phase-detail">Action map</text>
  <text x="810" y="152" text-anchor="middle" class="phase-detail">HTML report</text>
  <text x="810" y="165" text-anchor="middle" class="phase-detail">Execution summary</text>

  <!-- Output arrow -->
  <line x1="870" y1="130" x2="905" y2="130" class="connector"/>
  <text x="912" y="126" font-size="10" font-weight="600" fill="#475569">PR +</text>
  <text x="912" y="139" font-size="10" font-weight="600" fill="#475569">Evidence</text>

  <!-- Review reject loop -->
  <path d="M 506,180 L 506,240 Q 506,260 486,260 L 374,260 Q 354,260 354,240 L 354,180" class="reject-line"/>
  <text x="430" y="255" text-anchor="middle" class="reject-label">request_changes</text>
  <text x="430" y="270" text-anchor="middle" class="reject-label">(with specific suggestions)</text>

  <!-- Escalate path from triage -->
  <line x1="202" y1="180" x2="202" y2="300" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="202" y="313" text-anchor="middle" class="escalate-label">Escalate to human</text>

  <!-- Tests disabled note -->
  <rect x="598" y="200" width="120" height="40" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="658" y="217" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">Tests: disabled</text>
  <text x="658" y="230" text-anchor="middle" font-size="9" fill="#92400e">CI validates post-PR</text>
</svg>
