<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ooda-arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#475569"/>
    </marker>
    <filter id="ooda-shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <style>
    .ooda-box { filter: url(#ooda-shadow); }
    .ooda-label { font-size: 14px; font-weight: 700; fill: #fff; }
    .ooda-detail { font-size: 10px; fill: #fff; opacity: 0.9; }
    .ooda-connector { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#ooda-arrow); }
    .ooda-title { font-size: 16px; font-weight: 700; fill: #1e293b; }
    .ooda-subtitle { font-size: 11px; fill: #64748b; }
  </style>

  <text x="240" y="28" text-anchor="middle" class="ooda-title">OODA Cycle (Per Phase)</text>
  <text x="240" y="46" text-anchor="middle" class="ooda-subtitle">Each phase runs this full cycle independently</text>

  <!-- Observe (top) -->
  <rect x="160" y="65" width="160" height="70" rx="12" fill="#3b82f6" class="ooda-box"/>
  <text x="240" y="95" text-anchor="middle" class="ooda-label">OBSERVE</text>
  <text x="240" y="112" text-anchor="middle" class="ooda-detail">Gather context, read issue,</text>
  <text x="240" y="124" text-anchor="middle" class="ooda-detail">prior results, repo state</text>

  <!-- Arrow down-right -->
  <path d="M 320,112 Q 380,112 380,172" class="ooda-connector"/>

  <!-- Plan (right) -->
  <rect x="310" y="175" width="160" height="70" rx="12" fill="#8b5cf6" class="ooda-box"/>
  <text x="390" y="205" text-anchor="middle" class="ooda-label">PLAN</text>
  <text x="390" y="222" text-anchor="middle" class="ooda-detail">LLM analysis, determine</text>
  <text x="390" y="234" text-anchor="middle" class="ooda-detail">strategy, generate fix</text>

  <!-- Arrow down-left -->
  <path d="M 380,245 Q 380,305 320,305" class="ooda-connector"/>

  <!-- Act (bottom) -->
  <rect x="160" y="275" width="160" height="70" rx="12" fill="#10b981" class="ooda-box"/>
  <text x="240" y="305" text-anchor="middle" class="ooda-label">ACT</text>
  <text x="240" y="322" text-anchor="middle" class="ooda-detail">Execute tools, write files,</text>
  <text x="240" y="334" text-anchor="middle" class="ooda-detail">run commands, verify findings</text>

  <!-- Arrow down-left to Validate -->
  <path d="M 160,310 Q 100,310 100,370" class="ooda-connector"/>

  <!-- Validate (left-bottom) -->
  <rect x="10" y="365" width="160" height="70" rx="12" fill="#06b6d4" class="ooda-box"/>
  <text x="90" y="395" text-anchor="middle" class="ooda-label">VALIDATE</text>
  <text x="90" y="412" text-anchor="middle" class="ooda-detail">Check results, structural</text>
  <text x="90" y="424" text-anchor="middle" class="ooda-detail">validation, consistency</text>

  <!-- Arrow up to Reflect -->
  <path d="M 90,365 Q 90,340 90,315" class="ooda-connector"/>

  <!-- Reflect (left) -->
  <rect x="10" y="175" width="160" height="70" rx="12" fill="#f59e0b" class="ooda-box"/>
  <text x="90" y="195" text-anchor="middle" class="ooda-label">REFLECT</text>
  <text x="90" y="212" text-anchor="middle" class="ooda-detail">Decide: advance phase,</text>
  <text x="90" y="224" text-anchor="middle" class="ooda-detail">retry, or escalate</text>

  <!-- Arrow back up to Observe (iterate) -->
  <path d="M 90,175 Q 90,130 160,100" class="ooda-connector"/>

  <!-- Center: iteration/exit labels -->
  <text x="240" y="195" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">iterate</text>
  <text x="240" y="212" text-anchor="middle" font-size="11" fill="#64748b">or</text>
  <text x="240" y="229" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600">next phase</text>

  <!-- Exit arrows -->
  <rect x="310" y="365" width="160" height="55" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="390" y="388" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">Next Phase</text>
  <text x="390" y="405" text-anchor="middle" font-size="10" fill="#64748b">or Escalate to Human</text>
  <path d="M 170,210 Q 240,240 310,392" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#ooda-arrow)"/>
</svg>
