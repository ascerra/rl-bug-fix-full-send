<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 560" font-family="Segoe UI, system-ui, sans-serif">

  <text x="390" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Engine Architecture</text>
  <text x="390" y="46" text-anchor="middle" font-size="11" fill="#64748b">Layered design with phase isolation and zero-trust boundaries</text>

  <!-- GitHub Actions layer -->
  <rect x="20" y="60" width="740" height="50" rx="8" fill="#1e293b"/>
  <text x="40" y="83" font-size="12" font-weight="700" fill="#94a3b8">GITHUB ACTIONS</text>
  <rect x="210" y="70" width="130" height="30" rx="5" fill="#334155"/>
  <text x="275" y="90" text-anchor="middle" font-size="10" fill="#e2e8f0" font-weight="600">ralph-loop.yml</text>
  <rect x="360" y="70" width="130" height="30" rx="5" fill="#334155"/>
  <text x="425" y="90" text-anchor="middle" font-size="10" fill="#e2e8f0" font-weight="600">quality-scan.yml</text>
  <rect x="510" y="70" width="100" height="30" rx="5" fill="#334155"/>
  <text x="560" y="90" text-anchor="middle" font-size="10" fill="#e2e8f0" font-weight="600">Artifacts</text>
  <rect x="625" y="70" width="120" height="30" rx="5" fill="#334155"/>
  <text x="685" y="90" text-anchor="middle" font-size="10" fill="#e2e8f0" font-weight="600">Step Summary</text>

  <!-- Orchestration layer -->
  <rect x="20" y="120" width="740" height="70" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="40" y="143" font-size="11" font-weight="700" fill="#1d4ed8">ORCHESTRATION</text>

  <rect x="180" y="132" width="150" height="46" rx="6" fill="#3b82f6"/>
  <text x="255" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">loop.py</text>
  <text x="255" y="165" text-anchor="middle" font-size="9" fill="#dbeafe">Phase dispatch, transitions</text>

  <rect x="350" y="132" width="120" height="46" rx="6" fill="#3b82f6"/>
  <text x="410" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">config.py</text>
  <text x="410" y="165" text-anchor="middle" font-size="9" fill="#dbeafe">YAML config system</text>

  <rect x="490" y="132" width="120" height="46" rx="6" fill="#3b82f6"/>
  <text x="550" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">secrets.py</text>
  <text x="550" y="165" text-anchor="middle" font-size="9" fill="#dbeafe">Redaction pipeline</text>

  <rect x="625" y="132" width="120" height="46" rx="6" fill="#60a5fa"/>
  <text x="685" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">__main__.py</text>
  <text x="685" y="165" text-anchor="middle" font-size="9" fill="#dbeafe">CLI entry point</text>

  <!-- Phases layer -->
  <rect x="20" y="200" width="740" height="80" rx="8" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="40" y="223" font-size="11" font-weight="700" fill="#6d28d9">PHASES</text>

  <rect x="120" y="215" width="95" height="50" rx="6" fill="#7c3aed"/>
  <text x="167" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Triage</text>
  <text x="167" y="252" text-anchor="middle" font-size="8" fill="#ede9fe">Classify + repro</text>

  <rect x="230" y="215" width="95" height="50" rx="6" fill="#7c3aed"/>
  <text x="277" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Implement</text>
  <text x="277" y="252" text-anchor="middle" font-size="8" fill="#ede9fe">Fix + lint</text>

  <rect x="340" y="215" width="95" height="50" rx="6" fill="#7c3aed"/>
  <text x="387" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Review</text>
  <text x="387" y="252" text-anchor="middle" font-size="8" fill="#ede9fe">Zero-trust</text>

  <rect x="450" y="215" width="95" height="50" rx="6" fill="#7c3aed"/>
  <text x="497" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Validate</text>
  <text x="497" y="252" text-anchor="middle" font-size="8" fill="#ede9fe">PR creation</text>

  <rect x="560" y="215" width="95" height="50" rx="6" fill="#7c3aed"/>
  <text x="607" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Report</text>
  <text x="607" y="252" text-anchor="middle" font-size="8" fill="#ede9fe">HTML evidence</text>

  <rect x="670" y="215" width="80" height="50" rx="6" fill="#a78bfa"/>
  <text x="710" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Prompts</text>
  <text x="710" y="252" text-anchor="middle" font-size="8" fill="#ede9fe">templates/</text>

  <!-- Tools layer -->
  <rect x="20" y="290" width="360" height="80" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="40" y="313" font-size="11" font-weight="700" fill="#047857">TOOLS</text>

  <rect x="120" y="305" width="110" height="50" rx="6" fill="#10b981"/>
  <text x="175" y="327" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">ToolExecutor</text>
  <text x="175" y="342" text-anchor="middle" font-size="8" fill="#d1fae5">7 sandboxed tools</text>

  <rect x="245" y="305" width="120" height="50" rx="6" fill="#34d399"/>
  <text x="305" y="327" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">test_runner.py</text>
  <text x="305" y="342" text-anchor="middle" font-size="8" fill="#d1fae5">Stack detection</text>

  <!-- Integrations layer -->
  <rect x="400" y="290" width="360" height="80" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="420" y="313" font-size="11" font-weight="700" fill="#c2410c">INTEGRATIONS</text>

  <rect x="520" y="305" width="50" height="50" rx="6" fill="#f97316"/>
  <text x="545" y="335" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">LLM</text>
  <rect x="580" y="305" width="50" height="50" rx="6" fill="#fb923c"/>
  <text x="605" y="335" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">GH</text>
  <rect x="640" y="305" width="50" height="50" rx="6" fill="#fdba74" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="665" y="331" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Slack</text>
  <text x="665" y="345" text-anchor="middle" font-size="7" fill="#78716c">optional</text>
  <rect x="700" y="305" width="50" height="50" rx="6" fill="#fed7aa" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="725" y="331" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Jira</text>
  <text x="725" y="345" text-anchor="middle" font-size="7" fill="#78716c">optional</text>

  <!-- Observability layer -->
  <rect x="20" y="380" width="470" height="70" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="40" y="403" font-size="11" font-weight="700" fill="#b91c1c">OBSERVABILITY</text>

  <rect x="160" y="393" width="90" height="42" rx="6" fill="#ef4444"/>
  <text x="205" y="413" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Logger</text>
  <text x="205" y="426" text-anchor="middle" font-size="8" fill="#fee2e2">+ narration</text>

  <rect x="265" y="393" width="80" height="42" rx="6" fill="#f87171"/>
  <text x="305" y="418" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Tracer</text>

  <rect x="360" y="393" width="80" height="42" rx="6" fill="#fca5a5"/>
  <text x="400" y="418" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Metrics</text>

  <!-- Self-improvement layer -->
  <rect x="510" y="380" width="250" height="70" rx="8" fill="#fefce8" stroke="#fef08a" stroke-width="1"/>
  <text x="530" y="403" font-size="11" font-weight="700" fill="#a16207">SELF-IMPROVEMENT</text>

  <rect x="530" y="410" width="100" height="30" rx="6" fill="#eab308"/>
  <text x="580" y="430" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Principles</text>

  <rect x="640" y="410" width="100" height="30" rx="6" fill="#facc15"/>
  <text x="690" y="430" text-anchor="middle" font-size="9" font-weight="600" fill="#422006">Extraction</text>

  <!-- Visualization layer -->
  <rect x="20" y="460" width="740" height="70" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="40" y="483" font-size="11" font-weight="700" fill="#15803d">VISUALIZATION</text>

  <rect x="160" y="475" width="110" height="42" rx="6" fill="#22c55e"/>
  <text x="215" y="495" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">report.html</text>
  <text x="215" y="508" text-anchor="middle" font-size="8" fill="#dcfce7">Jinja2 + D3.js</text>

  <rect x="285" y="475" width="110" height="42" rx="6" fill="#4ade80"/>
  <text x="340" y="500" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">Decision Tree</text>

  <rect x="410" y="475" width="110" height="42" rx="6" fill="#4ade80"/>
  <text x="465" y="500" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">Action Map</text>

  <rect x="535" y="475" width="110" height="42" rx="6" fill="#4ade80"/>
  <text x="590" y="500" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">Comparison</text>

  <rect x="660" y="475" width="90" height="42" rx="6" fill="#86efac"/>
  <text x="705" y="500" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">Publisher</text>
</svg>
