<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 700" font-family="Segoe UI, system-ui, sans-serif">

  <text x="390" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Engine Architecture</text>
  <text x="390" y="46" text-anchor="middle" font-size="11" fill="#64748b">Layered design with phase isolation, zero-trust boundaries, and neutral observer</text>

  <!-- GitHub Actions layer -->
  <rect x="20" y="60" width="740" height="50" rx="8" fill="#1e293b"/>
  <text x="40" y="83" font-size="12" font-weight="700" fill="#94a3b8">GITHUB ACTIONS</text>
  <rect x="210" y="70" width="130" height="30" rx="5" fill="#334155"/>
  <text x="275" y="90" text-anchor="middle" font-size="10" fill="#e2e8f0" font-weight="600">rl-engine.yml</text>
  <rect x="360" y="70" width="130" height="30" rx="5" fill="#334155"/>
  <text x="425" y="90" text-anchor="middle" font-size="10" fill="#e2e8f0" font-weight="600">quality-scan.yml</text>
  <rect x="510" y="70" width="100" height="30" rx="5" fill="#334155"/>
  <text x="560" y="90" text-anchor="middle" font-size="10" fill="#e2e8f0" font-weight="600">Artifacts</text>
  <rect x="625" y="70" width="120" height="30" rx="5" fill="#334155"/>
  <text x="685" y="90" text-anchor="middle" font-size="10" fill="#e2e8f0" font-weight="600">Step Summary</text>

  <!-- Orchestration layer -->
  <rect x="20" y="120" width="740" height="70" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="40" y="143" font-size="11" font-weight="700" fill="#1d4ed8">ORCHESTRATION</text>

  <rect x="160" y="132" width="140" height="46" rx="6" fill="#3b82f6"/>
  <text x="230" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">loop.py</text>
  <text x="230" y="165" text-anchor="middle" font-size="9" fill="#dbeafe">Phase dispatch + CI sub-loop</text>

  <rect x="315" y="132" width="110" height="46" rx="6" fill="#3b82f6"/>
  <text x="370" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">config.py</text>
  <text x="370" y="165" text-anchor="middle" font-size="9" fill="#dbeafe">YAML config system</text>

  <rect x="440" y="132" width="110" height="46" rx="6" fill="#3b82f6"/>
  <text x="495" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">secrets.py</text>
  <text x="495" y="165" text-anchor="middle" font-size="9" fill="#dbeafe">Redaction pipeline</text>

  <rect x="565" y="132" width="85" height="46" rx="6" fill="#60a5fa"/>
  <text x="607" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">__main__.py</text>
  <text x="607" y="165" text-anchor="middle" font-size="9" fill="#dbeafe">CLI entry</text>

  <rect x="665" y="132" width="85" height="46" rx="6" fill="#60a5fa"/>
  <text x="707" y="152" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">ci_monitor.py</text>
  <text x="707" y="165" text-anchor="middle" font-size="9" fill="#dbeafe">CI polling</text>

  <!-- Phases layer -->
  <rect x="20" y="200" width="740" height="80" rx="8" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="40" y="223" font-size="11" font-weight="700" fill="#6d28d9">PHASES</text>

  <rect x="110" y="215" width="82" height="50" rx="6" fill="#7c3aed"/>
  <text x="151" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Triage</text>
  <text x="151" y="252" text-anchor="middle" font-size="8" fill="#ede9fe">Classify + repro</text>

  <rect x="200" y="215" width="82" height="50" rx="6" fill="#7c3aed"/>
  <text x="241" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Implement</text>
  <text x="241" y="252" text-anchor="middle" font-size="8" fill="#ede9fe">Fix + lint</text>

  <rect x="290" y="215" width="82" height="50" rx="6" fill="#7c3aed"/>
  <text x="331" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Review</text>
  <text x="331" y="252" text-anchor="middle" font-size="8" fill="#ede9fe">Zero-trust</text>

  <rect x="380" y="215" width="82" height="50" rx="6" fill="#7c3aed"/>
  <text x="421" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Validate</text>
  <text x="421" y="252" text-anchor="middle" font-size="8" fill="#ede9fe">PR creation</text>

  <rect x="470" y="215" width="82" height="50" rx="6" fill="#a78bfa"/>
  <text x="511" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">CI Remediate</text>
  <text x="511" y="252" text-anchor="middle" font-size="8" fill="#ede9fe">Fix CI failures</text>

  <rect x="560" y="215" width="82" height="50" rx="6" fill="#7c3aed"/>
  <text x="601" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Report</text>
  <text x="601" y="252" text-anchor="middle" font-size="8" fill="#ede9fe">HTML evidence</text>

  <rect x="660" y="215" width="80" height="50" rx="6" fill="#c4b5fd"/>
  <text x="700" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#1e1b4b">Prompts</text>
  <text x="700" y="252" text-anchor="middle" font-size="8" fill="#4c1d95">templates/</text>

  <!-- Tools layer -->
  <rect x="20" y="290" width="360" height="75" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="40" y="313" font-size="11" font-weight="700" fill="#047857">TOOLS</text>

  <rect x="120" y="305" width="110" height="46" rx="6" fill="#10b981"/>
  <text x="175" y="325" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">ToolExecutor</text>
  <text x="175" y="338" text-anchor="middle" font-size="8" fill="#d1fae5">7 sandboxed tools</text>

  <rect x="245" y="305" width="120" height="46" rx="6" fill="#34d399"/>
  <text x="305" y="325" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">test_runner.py</text>
  <text x="305" y="338" text-anchor="middle" font-size="8" fill="#d1fae5">Stack detection</text>

  <!-- Integrations layer -->
  <rect x="400" y="290" width="360" height="75" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="420" y="313" font-size="11" font-weight="700" fill="#c2410c">INTEGRATIONS</text>

  <rect x="520" y="305" width="50" height="46" rx="6" fill="#f97316"/>
  <text x="545" y="333" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">LLM</text>
  <rect x="580" y="305" width="50" height="46" rx="6" fill="#fb923c"/>
  <text x="605" y="333" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">GH</text>
  <rect x="640" y="305" width="50" height="46" rx="6" fill="#fdba74" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="665" y="329" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Slack</text>
  <text x="665" y="343" text-anchor="middle" font-size="7" fill="#78716c">optional</text>
  <rect x="700" y="305" width="50" height="46" rx="6" fill="#fed7aa" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="725" y="329" text-anchor="middle" font-size="10" font-weight="600" fill="#1e293b">Jira</text>
  <text x="725" y="343" text-anchor="middle" font-size="7" fill="#78716c">optional</text>

  <!-- Observability layer -->
  <rect x="20" y="375" width="470" height="70" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="40" y="398" font-size="11" font-weight="700" fill="#b91c1c">OBSERVABILITY</text>

  <rect x="160" y="390" width="75" height="42" rx="6" fill="#ef4444"/>
  <text x="197" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Logger</text>
  <text x="197" y="423" text-anchor="middle" font-size="8" fill="#fee2e2">+ narration</text>

  <rect x="245" y="390" width="70" height="42" rx="6" fill="#f87171"/>
  <text x="280" y="416" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Tracer</text>

  <rect x="325" y="390" width="70" height="42" rx="6" fill="#fca5a5"/>
  <text x="360" y="416" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Metrics</text>

  <rect x="405" y="390" width="75" height="42" rx="6" fill="#fca5a5"/>
  <text x="442" y="416" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Transcript</text>

  <!-- Self-improvement layer -->
  <rect x="510" y="375" width="250" height="70" rx="8" fill="#fefce8" stroke="#fef08a" stroke-width="1"/>
  <text x="530" y="398" font-size="11" font-weight="700" fill="#a16207">SELF-IMPROVEMENT</text>

  <rect x="530" y="407" width="100" height="30" rx="6" fill="#eab308"/>
  <text x="580" y="427" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Principles</text>

  <rect x="640" y="407" width="100" height="30" rx="6" fill="#facc15"/>
  <text x="690" y="427" text-anchor="middle" font-size="9" font-weight="600" fill="#422006">Extraction</text>

  <!-- Visualization layer -->
  <rect x="20" y="455" width="740" height="70" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="40" y="478" font-size="11" font-weight="700" fill="#15803d">VISUALIZATION</text>

  <rect x="135" y="470" width="90" height="42" rx="6" fill="#22c55e"/>
  <text x="180" y="488" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Three.js Scene</text>
  <text x="180" y="501" text-anchor="middle" font-size="8" fill="#dcfce7">3D landscape</text>

  <rect x="235" y="470" width="80" height="42" rx="6" fill="#4ade80"/>
  <text x="275" y="496" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">Timeline</text>

  <rect x="325" y="470" width="85" height="42" rx="6" fill="#4ade80"/>
  <text x="367" y="496" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">Narrative</text>

  <rect x="420" y="470" width="90" height="42" rx="6" fill="#4ade80"/>
  <text x="465" y="496" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">Decision Tree</text>

  <rect x="520" y="470" width="85" height="42" rx="6" fill="#4ade80"/>
  <text x="562" y="496" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">Action Map</text>

  <rect x="615" y="470" width="85" height="42" rx="6" fill="#4ade80"/>
  <text x="657" y="496" text-anchor="middle" font-size="9" font-weight="600" fill="#14532d">Comparison</text>

  <rect x="710" y="470" width="40" height="42" rx="6" fill="#86efac"/>
  <text x="730" y="496" text-anchor="middle" font-size="8" font-weight="600" fill="#14532d">Pub</text>

  <!-- Observer layer (separate job — visually distinct) -->
  <rect x="20" y="540" width="740" height="80" rx="8" fill="#faf5ff" stroke="#e9d5ff" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="40" y="563" font-size="11" font-weight="700" fill="#7e22ce">NEUTRAL OBSERVER</text>
  <text x="200" y="563" font-size="9" fill="#a855f7">(separate GH Actions job — own runner, own OIDC credentials)</text>

  <rect x="50" y="575" width="110" height="36" rx="6" fill="#9333ea"/>
  <text x="105" y="598" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Reconstructor</text>

  <rect x="175" y="575" width="110" height="36" rx="6" fill="#9333ea"/>
  <text x="230" y="598" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Cross-Checker</text>

  <rect x="300" y="575" width="110" height="36" rx="6" fill="#9333ea"/>
  <text x="355" y="598" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Attestation</text>

  <rect x="425" y="575" width="110" height="36" rx="6" fill="#a855f7"/>
  <text x="480" y="593" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Signer</text>
  <text x="480" y="605" text-anchor="middle" font-size="8" fill="#e9d5ff">Sigstore OIDC</text>

  <rect x="550" y="575" width="90" height="36" rx="6" fill="#a855f7"/>
  <text x="595" y="598" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">Policy</text>

  <rect x="655" y="575" width="90" height="36" rx="6" fill="#c084fc"/>
  <text x="700" y="593" text-anchor="middle" font-size="9" font-weight="600" fill="#3b0764">PR Comment</text>
  <text x="700" y="605" text-anchor="middle" font-size="8" fill="#581c87">result post</text>

  <!-- Trust boundary label -->
  <rect x="20" y="633" width="740" height="38" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="390" y="648" text-anchor="middle" font-size="10" fill="#64748b">Agent cannot access observer signing credentials. Observer does not trust agent self-reported data.</text>
  <text x="390" y="662" text-anchor="middle" font-size="10" fill="#64748b">Attestation is in-toto Statement v1 signed via Sigstore keyless (GitHub Actions OIDC).</text>

</svg>
